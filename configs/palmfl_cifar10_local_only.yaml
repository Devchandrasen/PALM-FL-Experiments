experiment_name: palmfl_v8_cifar10_local_only
output_root: ./outputs
seed: 42

dataset:
  name: cifar10
  root: ./data
  download: true
  batch_size: 32
  eval_batch_size: 128
  num_workers: 0
  dirichlet_alpha: 0.3
  min_client_samples: 20
  augment: true

algorithm:
  variant: local_only

system:
  num_clients: 10
  participation_rate: 0.4
  rounds: 20
  warmup_rounds: 0
  eval_every: 1
  eval_num_clients: 10
  eval_max_batches: 0
  device: cpu
  stat_batch_size: 64

model:
  architectures: [small_cnn, wide_cnn, tiny_resnet, tiny_mobilenet]
  latent_dim: 64
  adapter_hidden_dim: 128
  head_hidden_dim: 0
  dropout: 0.1

training:
  lr: 0.001
  weight_decay: 0.0001
  local_epochs: 2
  real_finetune_epochs: 1
  grad_clip: 5.0
  prototype_loss_weight: 0.0
  prototype_ce_loss_weight: 0.0
  prototype_ce_temperature: 0.25
  covariance_loss_weight: 0.005
  stat_head_loss_weight: 1.0
  stat_head_steps: 0
  stat_head_min_steps: 0
  stat_head_ramp_rounds: 0
  label_smoothing: 0.05
  latent_mixup_alpha: 0.4
  normalize_latent: true
  stats_max_batches: 6
  enable_prototype_alignment: false
  enable_stat_head: false
  upload_stats: false
  stat_prior_mix: 0.0
  stat_missing_class_boost: 0.0
  stat_inverse_hist_power: 0.0
  stat_class_focus_mix: 0.0

stats_server:
  min_variance: 0.05
  ema_momentum: 0.8
  temperature: 1.0
  min_class_coverage_for_transfer: 0.0

dp:
  enable: false
  clip_norm: 4.0
  count_clip: 200.0
  count_threshold: 1.0
  noise_multiplier: 0.0
  delta: 1.0e-5

scheduler:
  policy: mobile
  uplink_budget_mb: 12.0
  downlink_budget_mb: 12.0
  energy_budget_j: 180.0
  round_time_budget_s: 180.0
  min_battery_fraction: 0.12
  utility_weights:
    data: 1.0
    diversity: 0.8
    staleness: 0.4
    battery: 0.3
    loss: 0.3
  cost_weights:
    upload: 1.0
    download: 0.5
    energy: 0.8
    time: 0.8

logging:
  save_checkpoints: true
  checkpoint_every: 5
