experiment_name: palmfl_v8_mnist_stats_transfer_mobile
output_root: ./outputs
seed: 42

dataset:
  name: mnist
  root: ./data
  download: true
  batch_size: 32
  eval_batch_size: 128
  num_workers: 0
  dirichlet_alpha: 0.3
  min_client_samples: 20
  augment: false

algorithm:
  variant: stats_transfer

system:
  num_clients: 10
  participation_rate: 0.4
  rounds: 15
  warmup_rounds: 3
  eval_every: 1
  eval_num_clients: 10
  eval_max_batches: 0
  device: cpu
  stat_batch_size: 64

model:
  architectures: [small_cnn, wide_cnn, tiny_resnet, tiny_mobilenet]
  latent_dim: 48
  adapter_hidden_dim: 96
  head_hidden_dim: 0
  dropout: 0.1

training:
  lr: 0.001
  weight_decay: 0.0001
  local_epochs: 1
  real_finetune_epochs: 0
  grad_clip: 5.0
  prototype_loss_weight: 0.35
  prototype_ce_loss_weight: 0.15
  prototype_ce_temperature: 0.20
  covariance_loss_weight: 0.01
  stat_head_loss_weight: 1.0
  stat_head_steps: 4
  stat_head_min_steps: 1
  stat_head_ramp_rounds: 4
  label_smoothing: 0.0
  latent_mixup_alpha: 0.0
  normalize_latent: true
  stats_max_batches: 6
  enable_prototype_alignment: true
  enable_stat_head: true
  upload_stats: true
  stat_prior_mix: 0.35
  stat_missing_class_boost: 1.5
  stat_inverse_hist_power: 0.8
  stat_class_focus_mix: 0.35

stats_server:
  min_variance: 0.03
  ema_momentum: 0.7
  temperature: 1.0
  min_class_coverage_for_transfer: 0.60

dp:
  enable: true
  clip_norm: 4.0
  count_clip: 200.0
  count_threshold: 1.0
  noise_multiplier: 0.0
  delta: 1.0e-5

scheduler:
  policy: mobile
  uplink_budget_mb: 8.0
  downlink_budget_mb: 8.0
  energy_budget_j: 120.0
  round_time_budget_s: 120.0
  min_battery_fraction: 0.12
  utility_weights:
    data: 1.0
    diversity: 0.8
    staleness: 0.4
    battery: 0.3
    loss: 0.3
  cost_weights:
    upload: 1.0
    download: 0.5
    energy: 0.8
    time: 0.8

logging:
  save_checkpoints: true
  checkpoint_every: 5
